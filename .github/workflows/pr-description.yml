name: PR Description

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-description:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Update PR description
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const categoryRules = [
              {
                name: 'CI',
                match: (path) => path.startsWith('.github/'),
                summary: 'GitHub Actionsなどの自動化を更新しました。',
              },
              {
                name: 'UI',
                match: (path) =>
                  path === 'App.tsx' ||
                  path.startsWith('src/features/') ||
                  path.startsWith('src/ui/'),
                summary: '画面やコンポーネントを更新しました。',
              },
              {
                name: 'テーマ',
                match: (path) => path.startsWith('src/constants/'),
                summary: 'テーマや配色を更新しました。',
              },
              {
                name: 'データ',
                match: (path) => path.startsWith('src/data/'),
                summary: '初期データやサンプルデータを更新しました。',
              },
              {
                name: '設定',
                match: (path) =>
                  [
                    'package.json',
                    'package-lock.json',
                    'tsconfig.json',
                    'app.json',
                  ].includes(path),
                summary: 'プロジェクト設定を更新しました。',
              },
              {
                name: 'ドキュメント',
                match: (path) => path.endsWith('.md'),
                summary: 'ドキュメントを更新しました。',
              },
            ];

            const groups = new Map([
              ...categoryRules.map((rule) => [rule.name, []]),
              ['その他', []],
            ]);

            for (const file of files) {
              const rule = categoryRules.find((item) => item.match(file.filename));
              groups.get(rule?.name ?? 'その他').push(file);
            }

            const touchedRules = categoryRules.filter(
              (rule) => groups.get(rule.name).length > 0
            );
            const overview = touchedRules.map((rule) => `- ${rule.summary}`);
            if (groups.get('その他').length > 0) {
              overview.push('- その他の関連ファイルを更新しました。');
            }
            if (overview.length === 0) {
              overview.push('- 差分から変更内容を取得できませんでした。');
            }

            const body = `## 概要\n${overview.join('\n')}`;

            const start = '<!-- pr-auto-summary:start -->';
            const end = '<!-- pr-auto-summary:end -->';
            const block = `${start}\n${body}\n${end}`;
            const currentBody = pr.body ?? '';
            const escapeRegExp = (value) =>
              value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const blockPattern = new RegExp(
              `${escapeRegExp(start)}[\\s\\S]*?${escapeRegExp(end)}`
            );
            const nextBody = blockPattern.test(currentBody)
              ? currentBody.replace(blockPattern, block)
              : currentBody.trim()
                ? `${currentBody.trim()}\n\n${block}`
                : block;

            if (nextBody === currentBody) {
              core.info('PR description is already up to date.');
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              body: nextBody,
            });
