name: PR Description

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-description:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Update PR description
        uses: actions/github-script@v9
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_PR_DESCRIPTION_MODEL || 'gpt-4.1-mini' }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;
            const start = '<!-- pr-auto-summary:start -->';
            const end = '<!-- pr-auto-summary:end -->';
            const escapeRegExp = (value) =>
              value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const blockPattern = new RegExp(
              `${escapeRegExp(start)}[\\s\\S]*?${escapeRegExp(end)}`
            );
            const manualPrBody = (pr.body ?? '').replace(blockPattern, '').trim();

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const truncate = (value, maxLength) => {
              if (!value || value.length <= maxLength) {
                return value ?? '';
              }

              return `${value.slice(0, maxLength)}\n...省略...`;
            };

            const diffSummary = files
              .map((file) => {
                const patch = file.patch
                  ? `\n${truncate(file.patch, 3500)}`
                  : '';
                return [
                  `File: ${file.filename}`,
                  `Status: ${file.status}`,
                  `Changes: +${file.additions}/-${file.deletions}`,
                  patch,
                ].join('\n');
              })
              .join('\n\n---\n\n');

            const fallbackSummary = () => {
              const fileNames = files.slice(0, 8).map((file) => `\`${file.filename}\``);
              const restCount = files.length - fileNames.length;
              const restText = restCount > 0 ? ` ほか ${restCount} 件` : '';
              if (fileNames.length === 0) {
                return '- 差分から変更内容を取得できませんでした。';
              }

              return `- ${fileNames.join('、')}${restText} の変更を反映しました。`;
            };

            const extractResponseText = (data) => {
              if (typeof data.output_text === 'string') {
                return data.output_text.trim();
              }

              const textParts = [];
              for (const item of data.output ?? []) {
                for (const content of item.content ?? []) {
                  if (typeof content.text === 'string') {
                    textParts.push(content.text);
                  }
                }
              }

              return textParts.join('\n').trim();
            };

            const generateSummary = async () => {
              const apiKey = process.env.OPENAI_API_KEY;
              if (!apiKey) {
                core.warning('OPENAI_API_KEY is not set. Falling back to a simple summary.');
                return fallbackSummary();
              }

              const prompt = [
                '以下はGitHub Pull Requestの情報と変更差分です。',
                'このPRで何が行われたかを、日本語で簡潔に要約してください。',
                '出力はMarkdown本文のみ。見出し、確認項目、変更ファイル一覧、差分規模、定型文は不要です。',
                '箇条書きなら3〜5個、文章なら2〜4文にしてください。',
                '差分にないことは書かないでください。',
                '',
                `PRタイトル: ${pr.title}`,
                '',
                `PR本文:\n${truncate(manualPrBody, 3000)}`,
                '',
                `変更差分:\n${truncate(diffSummary, 26000)}`,
              ].join('\n');

              try {
                const response = await fetch('https://api.openai.com/v1/responses', {
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${apiKey}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: process.env.OPENAI_MODEL,
                    instructions:
                      'あなたはPull Requestの変更内容を読み、開発者向けに正確で自然な日本語の概要を書くアシスタントです。',
                    input: prompt,
                    max_output_tokens: 500,
                  }),
                });

                const data = await response.json();
                if (!response.ok) {
                  core.warning(`OpenAI API request failed: ${response.status} ${JSON.stringify(data)}`);
                  return fallbackSummary();
                }

                return extractResponseText(data) || fallbackSummary();
              } catch (error) {
                core.warning(`OpenAI summary generation failed: ${error.message}`);
                return fallbackSummary();
              }
            };

            const summary = await generateSummary();
            const body = `## 概要\n${summary}`;

            const block = `${start}\n${body}\n${end}`;
            const currentBody = pr.body ?? '';
            const nextBody = blockPattern.test(currentBody)
              ? currentBody.replace(blockPattern, block)
              : currentBody.trim()
                ? `${currentBody.trim()}\n\n${block}`
                : block;

            if (nextBody === currentBody) {
              core.info('PR description is already up to date.');
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              body: nextBody,
            });
