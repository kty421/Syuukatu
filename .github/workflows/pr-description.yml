name: PR Description

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  models: read
  pull-requests: write

jobs:
  update-description:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Update PR description
        uses: actions/github-script@v9
        env:
          AI_PROVIDER: ${{ vars.PR_DESCRIPTION_AI_PROVIDER || 'github' }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_PR_DESCRIPTION_MODEL || 'openai/gpt-4.1' }}
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_PR_DESCRIPTION_MODEL || 'gpt-4.1-mini' }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;
            const start = '<!-- pr-auto-summary:start -->';
            const end = '<!-- pr-auto-summary:end -->';
            const escapeRegExp = (value) =>
              value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const blockPattern = new RegExp(
              `${escapeRegExp(start)}[\\s\\S]*?${escapeRegExp(end)}`
            );
            const manualPrBody = (pr.body ?? '').replace(blockPattern, '').trim();

            const pullFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${pr.base.sha}...${pr.head.sha}`,
            });

            const filesByName = new Map();
            for (const file of [
              ...pullFiles,
              ...(comparison.data.files ?? []),
            ]) {
              const current = filesByName.get(file.filename);
              filesByName.set(file.filename, {
                ...current,
                ...file,
                patch: file.patch ?? current?.patch,
              });
            }

            const files = [...filesByName.values()].sort((a, b) =>
              a.filename.localeCompare(b.filename, 'ja')
            );

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const truncate = (value, maxLength) => {
              if (!value || value.length <= maxLength) {
                return value ?? '';
              }

              return `${value.slice(0, maxLength)}\n...省略...`;
            };

            const fileInventory = files
              .map(
                (file) =>
                  `- ${file.status} ${file.filename} (+${file.additions}/-${file.deletions})`
              )
              .join('\n');

            const commitSummary = commits
              .map((commit) => `- ${commit.commit.message.split('\n')[0]}`)
              .join('\n');

            const patchDetails = files
              .map((file) => {
                const patch = file.patch
                  ? `\n${truncate(file.patch, 1600)}`
                  : '';
                return [
                  `File: ${file.filename}`,
                  `Status: ${file.status}`,
                  `Changes: +${file.additions}/-${file.deletions}`,
                  patch,
                ].join('\n');
              })
              .join('\n\n---\n\n');

            const extractResponseText = (data) => {
              if (typeof data.output_text === 'string') {
                return data.output_text.trim();
              }

              const textParts = [];
              for (const item of data.output ?? []) {
                for (const content of item.content ?? []) {
                  if (typeof content.text === 'string') {
                    textParts.push(content.text);
                  }
                }
              }

              return textParts.join('\n').trim();
            };

            const buildPrompt = () => {
              const prompt = [
                '以下はGitHub Pull Request全体の情報です。',
                '最新コミットだけではなく、base SHA から head SHA までのPR全体の差分をもとに要約してください。',
                'このPRで何が行われたかを、日本語で簡潔に要約してください。',
                '出力はMarkdown本文のみ。見出し、確認項目、変更ファイル一覧、差分規模、定型文は不要です。',
                '箇条書きなら3〜5個、文章なら2〜4文にしてください。',
                '差分にないことは書かないでください。',
                '',
                `PRタイトル: ${pr.title}`,
                `Base: ${pr.base.sha}`,
                `Head: ${pr.head.sha}`,
                '',
                `PR全体のコミット:\n${truncate(commitSummary, 5000)}`,
                '',
                `PR本文:\n${truncate(manualPrBody, 3000)}`,
                '',
                `PR全体の変更ファイル一覧:\n${truncate(fileInventory, 12000)}`,
                '',
                `主要差分抜粋:\n${truncate(patchDetails, 26000)}`,
              ].join('\n');

              return prompt;
            };

            const generateWithGitHubModel = async (prompt, model) => {
              const response = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model,
                  messages: [
                    {
                      role: 'system',
                      content:
                        'あなたはPull Requestの変更内容を読み、開発者向けに正確で自然な日本語の概要を書くアシスタントです。',
                    },
                    {
                      role: 'user',
                      content: prompt,
                    },
                  ],
                  max_tokens: 500,
                }),
              });

              const data = await response.json();
              if (!response.ok) {
                throw new Error(`GitHub Models request failed: ${response.status} ${JSON.stringify(data)}`);
              }

              const summary = data.choices?.[0]?.message?.content?.trim();
              if (!summary) {
                throw new Error('GitHub Models returned an empty summary.');
              }

              return {
                model: data.model ?? model,
                provider: 'GitHub Models',
                summary,
              };
            };

            const generateWithGitHubModels = async (prompt) => {
              const preferredModels = [
                process.env.GITHUB_MODELS_MODEL,
                'openai/gpt-4o',
                'openai/gpt-4.1-mini',
              ].filter((model, index, models) => model && models.indexOf(model) === index);
              const errors = [];

              for (const model of preferredModels) {
                try {
                  core.info(`Generating PR summary with GitHub Models: ${model}`);
                  return await generateWithGitHubModel(prompt, model);
                } catch (error) {
                  errors.push(`${model}: ${error.message}`);
                  core.warning(`GitHub Models failed with ${model}: ${error.message}`);
                }
              }

              throw new Error(`All GitHub Models candidates failed. ${errors.join(' | ')}`);
            };

            const generateWithOpenAI = async (prompt) => {
              const apiKey = process.env.OPENAI_API_KEY;
              if (!apiKey) {
                throw new Error('OPENAI_API_KEY secret is required when using the OpenAI provider.');
              }

              try {
                const response = await fetch('https://api.openai.com/v1/responses', {
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${apiKey}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: process.env.OPENAI_MODEL,
                    instructions:
                      'あなたはPull Requestの変更内容を読み、開発者向けに正確で自然な日本語の概要を書くアシスタントです。',
                    input: prompt,
                    max_output_tokens: 500,
                  }),
                });

                const data = await response.json();
                if (!response.ok) {
                  throw new Error(`OpenAI API request failed: ${response.status} ${JSON.stringify(data)}`);
                }

                const summary = extractResponseText(data);
                if (!summary) {
                  throw new Error('OpenAI API returned an empty summary.');
                }

                return {
                  model: data.model ?? process.env.OPENAI_MODEL,
                  provider: 'OpenAI API',
                  summary,
                };
              } catch (error) {
                throw new Error(`OpenAI summary generation failed: ${error.message}`);
              }
            };

            const generateSummary = async () => {
              const prompt = buildPrompt();
              const provider = (process.env.AI_PROVIDER || 'github').toLowerCase();

              if (provider === 'openai') {
                return generateWithOpenAI(prompt);
              }

              if (provider !== 'github') {
                throw new Error(`Unsupported PR_DESCRIPTION_AI_PROVIDER: ${provider}`);
              }

              try {
                return await generateWithGitHubModels(prompt);
              } catch (githubError) {
                core.warning(`GitHub Models summary generation failed: ${githubError.message}`);
                if (!process.env.OPENAI_API_KEY) {
                  throw githubError;
                }

                return generateWithOpenAI(prompt);
              }
            };

            const result = await generateSummary().catch((error) => {
              core.setFailed(error.message);
              return null;
            });
            if (!result) {
              return;
            }

            const body = [
              `## 概要\n${result.summary}`,
              `使用モデル: \`${result.provider} / ${result.model}\``,
            ].join('\n\n');

            const block = `${start}\n${body}\n${end}`;
            const currentBody = pr.body ?? '';
            const nextBody = blockPattern.test(currentBody)
              ? currentBody.replace(blockPattern, block)
              : currentBody.trim()
                ? `${currentBody.trim()}\n\n${block}`
                : block;

            if (nextBody === currentBody) {
              core.info('PR description is already up to date.');
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              body: nextBody,
            });
